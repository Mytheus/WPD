# Objetivo: configuração Kconfig mínima para a Etapa 1 (árvore do projeto compilável).
#
# Responsabilidade: habilitar apenas o necessário para um boot com log funcional via
# UART. A inicialização completa exigida pela arquitetura (Shell, Settings, GPIO,
# Threads, Timers, Workqueues — Etapa 2 do plano de implementação) é deliberadamente
# deixada de fora deste arquivo nesta etapa, para não pular etapas.
#
# Dependências: nenhuma além do board rpi_pico (console/UART já habilitados pelo
# defconfig do board).
#
# Como testar: west build -b rpi_pico app -- a imagem deve subir e imprimir, via
# Logging, a mensagem de boot definida em src/main.c.
#
# Próxima etapa (Etapa 2) adicionará aqui: CONFIG_SHELL, CONFIG_SETTINGS,
# CONFIG_FLASH/CONFIG_NVS, CONFIG_GPIO, CONFIG_PWM e os símbolos de threads.

CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
