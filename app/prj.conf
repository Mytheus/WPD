# Objetivo: configuração Kconfig das Etapas 2 (infraestrutura) e 3 (canais ZBus) — liga
# os subsistemas exigidos pela arquitetura (docs/ARCHITECTURE.md, Restrição 3.6 e
# RF06/RF07) sem ainda registrar nenhum handler de negócio (comando de Shell, schema de
# Settings, callback de Input, observer de canal). Cada subsistema é apenas "ligado e
# verificado pronto" em src/main.c.
#
# Responsabilidade: habilitar Logging (Etapa 1), Shell, Settings+NVS, Input (botão via
# gpio-keys), I2C (barramento do futuro IMU), PWM (motor de vibração) e ZBus (Etapa 3).
#
# Dependências: CONFIG_GPIO já vem =y do defconfig do board (rpi_pico_defconfig) — não
# precisa ser repetido aqui. Threads/Timers/Workqueues (k_thread, k_timer, k_work) são
# APIs do kernel Zephyr sempre presentes, sem Kconfig de habilitação própria; não há
# thread de aplicação real nesta etapa (sensor_thread/posture_thread/notification
# listener nascem na Etapa 4, junto com os módulos que as justificam) — CONFIG_THREAD_*
# abaixo só habilita introspecção via Shell das threads já existentes no kernel.
#
# Como testar: west build -b rpi_pico app -- a imagem deve subir, inicializar Settings
# (sem handlers, é um no-op válido), confirmar via log que i2c0/pwm/buttons/led0 estão
# "ready", e o shell deve responder ao comando `kernel threads` e `settings` na UART.
#
# Etapa 3 (canais ZBus): CONFIG_ZBUS=y liga o barramento. RNF02/Restrição 3
# (memória restrita, evitar alocação dinâmica) motivou desligar
# CONFIG_ZBUS_PREFER_DYNAMIC_ALLOCATION — os canais em si (ZBUS_CHAN_DEFINE) já são
# estáticos independente desta opção; ela só afeta funcionalidades que não usamos ainda
# (ZBUS_MSG_SUBSCRIBER/listener assíncrono). CONFIG_ZBUS_CHANNEL_NAME/OBSERVER_NAME
# habilitam nomes legíveis em log/debug, custo de Flash desprezível.
#
# Próxima etapa (Etapa 4) adicionará aqui os Kconfig específicos de cada módulo
# (app/src/modules/*), conforme forem implementados.

CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y

CONFIG_SHELL=y

CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_SHELL=y

CONFIG_INPUT=y
CONFIG_I2C=y
CONFIG_PWM=y

CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y

CONFIG_ZBUS=y
CONFIG_ZBUS_PREFER_DYNAMIC_ALLOCATION=n
CONFIG_ZBUS_CHANNEL_NAME=y
CONFIG_ZBUS_OBSERVER_NAME=y
