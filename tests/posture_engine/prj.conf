# Objetivo: Kconfig do Ztest de posture_engine (Etapa 11).
#
# Responsabilidade: espelhar, do app real (app/prj.conf), só o que posture_engine.c
# realmente usa -- ZBus (com a mesma opção de evitar alocação dinâmica) e Logging.
# CONFIG_ZTEST=y é o único símbolo específico de teste.

CONFIG_ZTEST=y

CONFIG_LOG=y

CONFIG_ZBUS=y
CONFIG_ZBUS_PREFER_DYNAMIC_ALLOCATION=n
CONFIG_ZBUS_CHANNEL_NAME=y
CONFIG_ZBUS_OBSERVER_NAME=y
